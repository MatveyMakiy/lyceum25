<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Чат</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages/messages.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside id="sidebar"></aside>

      <main class="content">
        <p id="chat-status" class="messages-status"></p>

        <section id="chat-page" class="chat-page">
          <header class="chat-header">
            <a href="/messages.html">← Назад к чатам</a>
            <h1 id="chat-title"></h1>
          </header>

          <div id="chat-messages" class="chat-messages"></div>

          <form id="chat-form" class="chat-form">
            <textarea name="content" placeholder="Введите сообщение"></textarea>
            <p id="chat-error" class="error-text"></p>
            <button type="submit">Отправить</button>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="/src/pages/messages/chat.js"></script>
  </body>
</html>
