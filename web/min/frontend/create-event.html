<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Создание мероприятия</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages/events.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside id="sidebar"></aside>

      <main class="content">
        <section class="event-form-page">
          <h1>Создание мероприятия</h1>

          <form id="create-event-form" class="event-form">
            <input name="title" type="text" placeholder="Название мероприятия" />

            <textarea
              name="description"
              placeholder="Описание мероприятия"
            ></textarea>

            <input name="startTime" type="datetime-local" />
            <input name="endTime" type="datetime-local" />
            <input name="location" type="text" placeholder="Место проведения" />

            <select name="groupId" id="event-group-select">
              <option value="">Выберите группу</option>
            </select>

            <p id="create-event-error" class="error-text"></p>

            <div class="event-form__actions">
              <a href="/events.html" class="event-form__cancel">Отмена</a>
              <button type="submit">Создать</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="/src/pages/events/createEvent.js"></script>
  </body>
</html>
