<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профиль</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages/profile.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside id="sidebar"></aside>

      <main class="content">
        <p id="profile-status" class="profile-status"></p>

        <section id="profile-content" class="profile-page">
          <header class="profile-page__header">
            <div class="profile-page__avatar">
              <span id="profile-initials"></span>
            </div>

            <div>
              <h1 id="profile-name"></h1>
              <p id="profile-email" class="profile-page__email"></p>
            </div>
          </header>

          <div class="profile-page__info">
            <div class="profile-info-row">
              <span class="profile-info-row__label">Класс</span>
              <span id="profile-class"></span>
            </div>

            <div class="profile-info-row">
              <span class="profile-info-row__label">О себе</span>
              <span id="profile-bio"></span>
            </div>
          </div>

          <a class="profile-edit-link" href="/edit-profile.html">
            Редактировать профиль
          </a>
        </section>
      </main>
    </div>

    <script type="module" src="/src/pages/profile/myProfile.js"></script>
  </body>
</html>
