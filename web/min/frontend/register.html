<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages/auth.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <h1>Регистрация</h1>
        <form id="register-form" class="auth-form">
          <input name="name" type="text" placeholder="Имя" />
          <input name="email" type="email" placeholder="Почта" />
          <input name="password" type="password" placeholder="Пароль" />
          <input name="repeatPassword" type="password" placeholder="Повторите пароль" />
          <button type="submit">Зарегистрироваться</button>
        </form>
        <p id="register-error" class="error-text"></p>
        <a href="/login.html">Уже есть аккаунт?</a>
      </section>
    </main>
    <script type="module" src="/src/pages/auth/register.js"></script>
  </body>
</html>
