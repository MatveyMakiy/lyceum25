<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Редактирование поста</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages/posts.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside id="sidebar"></aside>

      <main class="content">
        <section class="post-form-page">
          <h1>Редактирование поста</h1>

          <form id="edit-post-form" class="post-form">
            <textarea
              name="content"
              placeholder="Напишите что-нибудь..."
            ></textarea>

            <p id="edit-post-error" class="error-text"></p>

            <div class="post-form__actions">
              <button
                id="cancel-edit-btn"
                class="post-form__cancel"
                type="button"
              >
                Отмена
              </button>
              <button type="submit">Сохранить</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="/src/pages/posts/editPost.js"></script>
  </body>
</html>
