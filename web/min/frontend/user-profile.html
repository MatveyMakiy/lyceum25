<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профиль пользователя</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages/profile.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside id="sidebar"></aside>

      <main class="content">
        <p id="user-profile-status" class="profile-status"></p>

        <section id="user-profile-content" class="profile-page">
          <header class="profile-page__header">
            <div class="profile-page__avatar">
              <span id="user-profile-initials"></span>
            </div>

            <div>
              <h1 id="user-profile-name"></h1>
            </div>
          </header>

          <div class="profile-page__info">
            <div class="profile-info-row">
              <span class="profile-info-row__label">Класс</span>
              <span id="user-profile-class"></span>
            </div>

            <div class="profile-info-row">
              <span class="profile-info-row__label">О себе</span>
              <span id="user-profile-bio"></span>
            </div>
          </div>

          <button id="start-chat-btn" class="profile-edit-link" type="button">
            Написать сообщение
          </button>
          <p id="start-chat-error" class="error-text"></p>
        </section>
      </main>
    </div>

    <script type="module" src="/src/pages/profile/userProfile.js"></script>
  </body>
</html>
