<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Редактирование группы</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages/groups.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside id="sidebar"></aside>
      <main class="content">
        <section class="group-form-page">
          <h1>Редактирование группы</h1>
          <form id="edit-group-form" class="group-form">
            <input name="name" type="text" placeholder="Название группы" />
            <textarea
              name="description"
              placeholder="Описание группы"
            ></textarea>
            <p id="edit-group-error" class="error-text"></p>
            <div class="group-form__actions">
              <a id="cancel-edit-group-link" href="/groups.html" class="group-form__cancel">
                Отмена
              </a>
              <button type="submit">Сохранить</button>
            </div>
          </form>
        </section>
      </main>
    </div>
    <script type="module" src="/src/pages/groups/editGroup.js"></script>
  </body>
</html>
